name: Tests

on:
  pull_request:
    paths:
      - 'apps/core/cardbey-core/src/**'
      - 'apps/core/cardbey-core/tests/**'
      - 'apps/core/cardbey-core/package.json'
      - 'apps/core/cardbey-core/package-lock.json'
      - 'apps/core/cardbey-core/prisma/**'
      - 'apps/core/cardbey-core/vitest.config.mjs'
  push:
    branches:
      - main
      - develop
      - 'rollback/**'
    paths:
      - 'apps/core/cardbey-core/src/**'
      - 'apps/core/cardbey-core/tests/**'
      - 'apps/core/cardbey-core/package.json'
      - 'apps/core/cardbey-core/package-lock.json'
      - 'apps/core/cardbey-core/prisma/**'
      - 'apps/core/cardbey-core/vitest.config.mjs'

env:
  NODE_ENV: test
  DATABASE_URL: file:./prisma/test.db

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/core/cardbey-core

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/core/cardbey-core/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema prisma/sqlite/schema.prisma

      - name: Prepare test database
        run: npx prisma db push --schema prisma/sqlite/schema.prisma --accept-data-loss

      - name: Run tests
        run: npm run test

