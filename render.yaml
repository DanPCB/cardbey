services:
  # Core API (staging)
  - type: web
    name: cardbey-core-staging
    runtime: node
    repo: https://github.com/DanPCB/cardbey
    branch: staging
    rootDir: apps/core/cardbey-core
    buildCommand: npm install && npx prisma generate --schema prisma/postgres/schema.prisma && (pip install crewai crewai-tools --quiet || echo "pip not available, CrewAI disabled")
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

  # Dashboard (staging) — static site build (Vite)
  - type: web
    name: cardbey-dashboard-staging
    runtime: static
    repo: https://github.com/DanPCB/cardbey
    branch: staging
    # rootDir is the dashboard package; Render may still run install from here. This buildCommand
    # cd's to monorepo root, refreshes the workspace lockfile without frozen CI (OUTDATED_LOCKFILE),
    # then builds staging from the dashboard directory.
    rootDir: apps/dashboard/cardbey-marketing-dashboard
    buildCommand: npm i -g pnpm@10.25.0 && pnpm -v && cd ../../../ && pnpm install --no-frozen-lockfile && cd apps/dashboard/cardbey-marketing-dashboard && pnpm run build:staging
    staticPublishPath: dist
