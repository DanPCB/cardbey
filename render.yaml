services:
  # Core API (staging)
  - type: web
    name: cardbey-core-staging
    runtime: node
    repo: https://github.com/DanPCB/cardbey
    branch: staging
    rootDir: apps/core/cardbey-core
    buildCommand: npm install && npx prisma generate --schema prisma/postgres/schema.prisma && (pip install crewai crewai-tools --quiet || echo "pip not available, CrewAI disabled")
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

  # Dashboard (staging) — static site build (Vite)
  - type: web
    name: cardbey-dashboard-staging
    runtime: static
    repo: https://github.com/DanPCB/cardbey
    branch: staging
    # Install must run from monorepo root: with rootDir here, `pnpm install` alone sees OUTDATED_LOCKFILE
    # (workspace lockfile lives at repo root; CI uses frozen lockfile by default).
    rootDir: apps/dashboard/cardbey-marketing-dashboard
    buildCommand: npm i -g pnpm@10.25.0 && pnpm -v && cd ../../.. && pnpm install --frozen-lockfile && pnpm --filter @cardbey/dashboard run build:staging
    staticPublishPath: dist
