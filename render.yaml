services:
  # Core API (staging)
  - type: web
    name: cardbey-core-staging
    runtime: node
    repo: https://github.com/DanPCB/cardbey
    branch: staging
    rootDir: apps/core/cardbey-core
    buildCommand: npm install && npx prisma generate --schema prisma/postgres/schema.prisma && (pip install crewai crewai-tools --quiet || echo "pip not available, CrewAI disabled")
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

  # Dashboard (staging) — static site build (Vite)
  # rootDir MUST be monorepo root: Render runs "Installing dependencies with pnpm" before buildCommand
  # from rootDir; only the repo-root pnpm-lock.yaml includes workspace importers (e.g. qrcode).
  - type: web
    name: cardbey-dashboard-staging
    runtime: static
    repo: https://github.com/DanPCB/cardbey
    branch: staging
    rootDir: .
    buildCommand: npm i -g pnpm@10.25.0 && pnpm -v && pnpm install --frozen-lockfile && pnpm --filter @cardbey/dashboard run build:staging
    staticPublishPath: apps/dashboard/cardbey-marketing-dashboard/dist
